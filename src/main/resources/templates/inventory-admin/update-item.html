<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Update Item</title>

    <link
            crossorigin="anonymous"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            rel="stylesheet"
    />
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h4 mb-4">Create New Product</h1>

                    <form method="post" th:action="@{/inventory/admin/{id}(id=${update.id})}" th:object="${update}">
                        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>

                        <div class="mb-3">
                            <label class="form-label" for="name">Name</label>
                            <input class="form-control" id="name" required th:field="*{name}"
                                   th:placeholder="${update.name}"
                                   type="text"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="price">Price</label>
                            <input class="form-control" id="price" min="0" required step="0.01"
                                   th:field="*{price}" th:placeholder="${update.price}" type="number"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="category">Category</label>
                            <input class="form-control" id="category" required th:field="*{category}"
                                   th:placeholder="${update.category}" type="text"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="stock">Stock</label>
                            <input class="form-control" id="stock" min="0" required th:field="*{stock}"
                                   th:placeholder="${update.stock}" type="number"/>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="imageUrl">Image URL</label>
                            <input class="form-control" id="imageUrl" th:field="*{imageUrl}"
                                   th:placeholder="${update.imageUrl}"
                                   type="url"/>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary" type="submit">Save</button>
                            <a class="btn btn-outline-secondary" th:href="@{/inventory/admin}">Go to admin homepage</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script
        crossorigin="anonymous"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
></script>
</body>
</html>
