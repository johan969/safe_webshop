<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Detail</title>
</head>
<body>
<div>
    <p th:text="'id: ' + ${detail.id}"></p>
    <p th:text="'name: ' + ${detail.name}"></p>
    <p th:text="'price: ' + ${detail.price}"></p>
    <p th:text="'category: ' + ${detail.category}"></p>
    <p th:text="'image: ' + ${detail.imageUrl}"></p>
</div>
<form method="post" th:action="@{/inventory/admin/{id}/delete(id=${detail.id})}">
    <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
    <button class="btn btn-outline-danger w-100"
            onclick="return confirm('Är du säker på att du vill ta bort detta?');"
            type="submit">
        <i class="bi bi-trash"></i> Delete
    </button>
</form>
<a th:href="@{/inventory/admin/{id}/edit(id=${detail.id})}" th:text="Edit"></a>
<a th:href="@{/inventory/admin}">go to admin homepage</a>
</body>
</html>
