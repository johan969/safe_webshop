<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">



<div class="ott-box">
    <p>Confirm your E-mail address to login </p>
<form action="/ott/generate" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <input type="hidden" name="username" th:value="${#authentication.name}"/>

    <button type="submit">Send link to my email</button>
</form>
</div>

</body>
</html>
