<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<h2>Products</h2>

<div th:each="product : ${products}">
    <h3 th:text="${product.name}"></h3>
    <p th:text="${product.price}"></p>
    <img th:src="${product.imageUrl}" width="200"/>


    <p th:if="${product.stock > 0}">
        In stock:
        <span th:text="${product.stock}"></span>
    </p>

    <p th:if="${product.stock == 0}">
        Out of stock!
    </p>


    <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
        <input type="number"
               name="quantity"
               value="1"
               min="1"
               th:attr="max=${product.stock}"/>

        <button type="submit"
                th:disabled="${product.stock == 0}">
            Add to cart
        </button>
    </form>
</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
